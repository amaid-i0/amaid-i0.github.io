<script>
const DATA = [{"id":"w1773587486898","title":"외계시인들","desc":"외계인이 락을 한다 충격실화","chapters":[{"title":"01","date":"2026-03-15","body":"밴드 연습은 시끄럽다. 그다지 넓지 않은 차고 안. 발밑을 울리는 강한 드럼 비트, 공간을 찢을 듯 쨍하게 터지는 기타 리프와 그 모든 것을 받치는 묵직한 베이스까지. 아쉽게도 제일 중요한 부분 하나가 빠져 비어 있었지만, 그렇다 하여도 이곳의 소음이 조금이라도 덜 시끄럽게 느껴지는 일은 없었다. 이 시간에는 바깥 세상의 일이 침범하지 못한다.\n\n…아마 그리하였을 터인데.\n\n쾅!\n\n악기를 잡고 있던 모두가 놀라 연주를 멈출 만큼 강한 소리였다. 그들이 하나둘 악기를 내려놓으며 웅성거렸다.\n\n“뭐야, 이 소리?”\n\n“배관이라도 터졌나?”\n\n“글쎄, 저 위에는 배관 없을걸? 그리고 배관보다는 무언가 떨어지는 소리 같았어.”\n\n“뭐가 떨어지면 저런 소리가 나? 소리가 심상치 않던데.”\n\n“그건 가서 봐야겠지. 수리공을 불러야 할 만큼 큰 일은 아니면 좋겠네… 돈 쓸 일이 더 생기면 안 된다고.”\n\n세 명은 가볍게 대화하며 차고 한 쪽에 놓여 있던 사다리를 꺼내 들고 밖으로 나섰다. 마당에서 차고 지붕을 올려다보자 어쩐지 심상치 않은 검은 연기가 피어오르고 있는 것이 그들의 눈에 띄었다. \n\n“…혹시 불이라도 나는 건 아니겠지?”\n\n“올라가서 봐.”\n\n곱슬기 있는 검은 머리카락에 푸른 눈을 한 베이시스트가 금발 기타리스트의 등을 떠밀며 여상한 톤으로 말했다. 기타리스트가 툴툴거리며 말했다.\n\n“왜 이런 건 늘 내 몫인 거야?”\n\n“왜긴. 네가 집주인 아들이니까 그렇지. 꾸물거리지 말고 빨리.”\n\n“쳇.”\n\n기타리스트는 꿍한 표정을 지으면서도 순순히 사다리를 오르기 시작했다. 곧 지붕 위에 도착한 기타리스트가 연기가 피어오르는 자리를 들여다보며 꽥 비명을 질렀다.\n\n“여기 사람이 있어!”\n\n…사람이라니? 상상했던 시나리오 중 가장 끝의 끝에나 나열되어 있던 것이었다. 베이시스트의 머릿속에 ‘또 못 믿을 말을 하네. 설마 진짜 사람이겠어.’ 하는 생각이 스쳤지만, 운 나쁘게 폭풍에 휘말린 돌멩이 같은 게 아니라는 말을 들은 이상 확인 정도는 해야 했다. \n\n베이시스트는 아직도 멀뚱한 얼굴로 지붕에서 피어오르는 연기를 올려다보던 드러머의 팔을 잡아끌며 사다리를 오르기 시작했다.\n\n“…진짜 사람이네.”\n\n“사람이지.”\n\n“사람이 아닐 가능성은 없을까?”\n\n“아니면 뭐? 외계인이라도 되나?”\n\n놀랍게도, 진짜 사람이 지붕 위에 쓰러져 있었다. 운석이라도 떨어진 듯 크게 패인 차고 지붕, 그리고 그 위에 누워 있는 한 남자. 검은 머리카락, 긴 속눈썹, 평범한 티셔츠에 청바지까지 남자의 겉모습에 특이한 구석이라고는 조금도 없었다. 그렇지만 그 점이 오히려 수상함을 증폭시켰다.\n\n남자가 얼마나 수상해 보이든 의식도 없는 사람을 마냥 지붕 위에 눕혀만 둘 수도 없는 노릇이었다. 셋은 사람을 등에 짊어지고, 팔과 다리를 잡아끌고, 땅바닥에 떨어뜨릴 뻔한 위기를 다섯 번쯤 겪으며 간신히 남자를 지붕에서 내리는 데 성공했다.\n\n“이제 어떻게 하지?”\n\n차고 안, 낡은 소파에 눕혀진 남자를 보며 기타리스트가 중얼거렸다.\n\n“어떻게 하긴. 신고해야지.”\n\n“그렇지만 적어도 일어날 때까지는 기다려 봐야 하지 않을까? 어쩌다 우리 집 차고 지붕에 추락했는지 정도는 알고 싶단 말이야.”\n\n“그건… 하아.”\n\n양손을 모아 간절한 눈빛을 보내는 기타리스트와 아무 말도 없지만 기타리스트와 같은 속내임이 뻔히 보이는 드러머의 모습에 베이시스트는 한숨을 내쉬었다. 안 그래도 보컬 없는 밴드가 될 판이라 고민이 깊은 차에 멤버라는 녀석들은 사소한 것 하나하나 속을 썩이고 있으니 심란함이 가실 틈이 없었다. \n\n베이시스트가 말 안 듣는 녀석들을 향해 한마디 꺼내려던 찰나, 기타리스트가 소파를 가리키며 소리쳤다.\n\n“저기! 눈 뜬다!”\n\n정말 그 말대로 소파에 엉거주춤 눕혀져 있던 정체불명의 남자가 눈을 뜨고 있었다. 눈을 뜨는 과정조차 범상함과는 거리가 멀었다. 남자는 우선 고개를 이리저리 휘저으며 주변을 빠르게 살피다가, 양손을 눈앞에 들어올리더니 손가락을 한참 꿈틀거렸다. ‘열 손가락이 전부 잘 작동하는지 확인하나 보다’ 정도가 그들이 추측할 수 있는 최선이었다. 이후 스트레칭이라도 하는 건지 도무지 이해할 수 없는 방향으로 사지를 뻗어 댔고, 그 모든 과정이 끝난 후에야 마침내 남자는 몸을 일으켜 앉을 수 있었다. \n\n의식인지 뭔지 모를 긴 행위가 끝날 때까지 가만히 지켜보던 베이시스트가 남자에게 질문을 건넸다.\n\n“그래서, 정체가 뭐야?”\n\n“정체?”\n\n정체, 정체라…. 남자는 마치 그 단어를 처음 들어보는 사람처럼 한참을 같은 말만 읊조렸다. \n\n베이시스트는 점점 이 웃기지도 않는 쇼에 더는 동참해 주고 싶지 않다는 마음이 커지는 것을 느꼈다. 그 마음이 말이 되어 튀어나오기 직전, 드디어 남자가 입을 열었다.\n\n“내 정체는 @^%$*!야.”\n\n“뭐라고?”\n\n“응? 내 정체는 평범하고 일반적인 인간이라고.”\n\n“보통 그런 말은 제일 평범하지 않은 사람이 하던데.”\n\n드러머가 중얼거렸다. 남자는 앞에서 무슨 말을 하듯 아랑곳하지 않고 하던 말만 꿋꿋하게 반복했다.\n\n“나는 인간이야, 인간. 의심하지 않아도 돼. 내가 만약 외계인이라면 이런 말을 하지 않았겠지. 우주 외부에서 온 존재를 외계인이라고 부르는 게 맞나? 아무튼 중요한 건, 너희와 다른 점이 전혀 없다는 거야. 게다가 나는 지극히 인간다운 평범한 신체를 갖추고 있다고.”\n\n“그러니까 네가 외계인이라고?”\n\n“무슨 말이지? 나는 지극히 보통의 인간이라니까.”\n\n“보통의 인간은 그런 말을 하지 않아….”\n\n베이시스트는 얼굴을 덮고 길게 한숨을 내쉬었다. 이 남자가 진짜 외계인이라고는 생각하지 않았다. 정신적으로 좀 문제가 있거나 마약 중독자이거나 하는 거겠지. 그렇지만 이 정도로 혼란한 상황에서는 차라리 그가 외계인이라고 믿는 편이 속 편할 것 같았다….\n\n“잠깐만, 방금 그거 뭐야?”\n\n“무엇을 말하는 것? 나에게는 아무 문제가 없어. 모든 면에서 철저히 인간.”\n\n“무슨 소리 하는 거야! 방금 초록색으로 뭔가를 꿈틀거렸잖아!”\n\n베이시스트는 황급히 기타리스트를 향해 고개를 돌렸다. 너 그거 봤어? 그럼, 당연하지! 베이시스트의 소리 없는 질문에 기타리스트도 눈빛으로 답했다. \n\n이곳에 있는 사람들 모두 분명히 보았다. 손이 있어야 할 자리에서 손 대신 꿈틀거리던, 초록색의… 촉수?\n\n“자, 너무 걱정하지 말고 편하게 말해 봐. 어차피 너의 정체는 사실상 들킨 거나 다름없어. 어쩌면 지금이 지구인들에게 편하게 도움을 요청할 수 있는 유일한 기회일지도 모른다고.”\n\n베이시스트의 심란함을 아는지 모르는지 기타리스트는 자기 가슴을 두드리며 이런 말까지 했다. 더욱 기가 막히는 건, 정체 모를 남자가 기타리스트의 말에 납득하는 것처럼 보였다는 점이다.\n\n“흠, 네 말이 맞을지도 모르겠군, 인간. 너의 제안을 수용하지.”\n\n사실상 본인이 외계인이 맞다는 고백이나 다름없었다. 이후로는 기타리스트와 드러머만 즐거운 외계인과의 질의응답 시간이 이어졌다.\n\n“지구에는 왜 온 거야?”\n\n“우리 종족의 이주처를 찾기 위해서.”\n\n“그런데 왜 우리 집 지붕에서 그러고 있었어?”\n\n“선함이 고장나서 추락했다.”\n\n“어떻게 인간 모습을 하고 있는 거야?”\n\n“우리는 의태 능력을 가지고 있어. 우리 종족이 가진 고유한 능력이지. 너희 언어로 소통할 수 있는 것도 마찬가지야.”\n\n“혹시 너 말고 다른 동족들도 지금 지구에 있어?”\n\n기타리스트의 질문에 외계인의 눈이 촉촉해졌다.\n\n“없어…. 아무도 없어. 이 행성에는 지금 나 혼자뿐이고 누군가 더 오지도 못할 거야.”\n\n“그건 그나마 다행이네.”\n\n드러머가 가볍게 중얼거리자, 기타리스트가 그에 반박하듯 외쳤다.\n\n“어떻게 그럴 수 있어! 가족도 친구도 잃어버리고 지구에 불시착한 불쌍한 외계인이잖아!”\n\n이미 호칭이 ‘불쌍한 외계인 친구’가 되어 버렸네. 젠장. 이 황당한 SF적 사건에서 빠져나갈 길은 이제 없겠어…. 베이시스트는 갑작스럽게 하늘에서 뚝 떨어진 외계인과 그 외계인을 아무렇지도 않게 받아들이는 동료들 중 어느 쪽에 더 큰 황당함을 느껴야 할지 결정할 수 없었다.\n\n”아무튼 외계인 친구, 우리가 어떻게 하면 너를 도와줄 수 있을까?”\n\n“너희 인간들은 참 친절하네. 고마워”\n\n외계인은 턱에 손을 짚고—이런 인간적인 제스처는 대체 언제 습득한 거지?!—한참을 고민하다 조심스럽게 입을 열었다.\n\n“그렇다면, 내가 나의 목소리를 이 행성에 널리 퍼뜨리는 것을 도와줄 수 있을까?”\n\n“목소리?”\n\n외계인의 부탁이라기엔 조금 특이하게 느껴지는 말이었다. 외계인도 드러머의 반문에 담긴 의구심을 읽었는지 조곤조곤 이유를 설명하기 시작했다.\n\n“내 종족들은 목소리에 감지할 수 없는 특수한 신호를 실어 발산하는 것이 가능하다. 목소리에만 국한되는 것은 아니고, 의태한 종족의 표준적인 의사소통 방법을 따르는데… 여기에서 복잡한 설명이 필요하지는 않겠지. 아무튼 이 신호는 목소리를 저장하는 장치에도 함께 저장될 수 있어. 보통은 그렇지. 그래서 나는 최대한 많은 곳에서 내 목소리가 재생되게 해서, 그 신호를 함께 퍼뜨리고 싶은 거고.”\n\n외계인의 말을 들은 기타리스트가 고개를 끄덕이며 명쾌하게 답했다.\n\n“그럼, 얘가 우리 밴드 보컬을 하면 어때?”\n\n“너 지금 제정신이야?”\n\n외계인과 웃고 떠드는 꼴을 봐주고 있었더니 하는 말이 점점 가관이 되는구나. 베이시스트가 목소리를 낮게 깔며 기타리스트를 향해 말했다.\n\n“지금 우리가 E. T.찍는 줄 알아? 아니, 차라리 E. T.처럼 외계인이랑 잠깐 친구 먹고 하하호호 하다가 떠나보내는 거면 낫지. 그런데 뭐라고? 우리 밴드 보컬을 맡기자고? 언제까지 헛소리만 할 생각이야?”\n\n“아니, 그렇지만….”\n\n기타리스트는 목소리를 살짝 떨면서도 꿋꿋하게 말을 이었다.\n\n“자, 들어봐. 이 외계인 친구가 집에 가려면 최대한 많은 수단으로 자기 목소리가 이 행성에 울려 퍼져야 한대. 그리고 록 밴드 보컬은 노래하는 게 직업이지. 게다가 이럴 수가, 여기에 마침 보컬을 구하는 중인 록 밴드가 있네? 어때, 완벽하지 않아? 이 외계인은 목소리도 꽤 괜찮다고.”\n\n“언제 봤다고 목소리 타령을…. 그럼 지구 생활 교육은 누가 시킬 거야? 얘가 노래를 할 줄은 알고? 신분 문제는?”\n\n“지구 교육은 내가 시킬게! 나 잘할 자신 있어. 노래는 일단 시켜 보면 알 수 있겠지.”\n\n“그래서 신분 문제는?”\n\n베이시스트의 날카로운 질문에도 기타리스트는 굴하지 않고 웃으며 대답했다.\n\n“그건 전문가한테 맡기면 돼. 우리 아버지 인생 최고의 후회 중 하나가 신분이 불분명하다는 이유만으로 선한 청년을 믿지 못하고 사회 복귀조차 도와주지 않은 일이라고 했거든. 그 트라우마를 자극해서 어떻게 잘 부탁드리면 되지 않을까? 신분 하나 만드는 거 자체는 사실 꽤 어렵지 않다고도 말하셨고.”\n\n상상치도 못한 불효막심한 발언에 베이시스트는 눈을 질끈 감았다.\n\n“일단 노래 한 번 시켜 보고 결정하면 어때? 이 정도는 아직 손해 볼 거 없잖아.”\n\n불난 집에 기름을 끼얹는 드러머의 말에 베이시스트는 난생 찾아본 적 없는 혈압약을 찾고 싶은 생각이 고개를 치드는 것을 느꼈다. 그러나 동시에 기타리스트의 유혹에 속아 넘어가려 하는 스스로를 직감할 수 있었다. \n\n대책도 없이 탈주한 전 보컬 때문에 얼마나 갖은 고생을 했던가? 그럼에도 여전히 보컬이 구해지지 않아 나라도 보컬을 맡아야 하나 말도 안 되는 고민마저 해 보았지 않나? 어쩌면 이번에야말로 쓸 만하고 말 잘 듣는 보컬을 찾을 수 있는 게 아닐까? \n\n허무맹랑한 말에 속아 넘어가고 있다는 자각은 있었지만, SF적인 사고마저 조금은 기꺼울 만큼 베이시스트는 오랜 고민에 빠져 있었다. 마침내 베이시스트가 대답했다.\n\n“좋아. 테스트 정도는 시켜 보자. 대신에 기준에 부합하지 않으면 바로 신고할 거야. CIA로 가든, 51구역의 지하 실험실에 갇히든 알아서 하라고 해.”"}]}];
let view='home', wi=0, ci=0;
function goHome(){view='home';render()}
function goWork(i){wi=i;view='work';render()}
function goChapter(i){ci=i;view='chapter';render();window.scrollTo(0,0)}
function esc(s){let d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
let fontSize=15;
function toggleSettings(){
  let p=document.getElementById('settingsPopup'), o=document.getElementById('settingsOverlay');
  let open=p.style.display==='block';
  p.style.display=open?'none':'block';
  o.style.display=open?'none':'block';
}
function closeSettings(){
  document.getElementById('settingsPopup').style.display='none';
  document.getElementById('settingsOverlay').style.display='none';
}
function changeFontSize(d){
  fontSize=Math.min(24,Math.max(10,fontSize+d));
  document.getElementById('fontSizeLabel').textContent=fontSize+'px';
  document.querySelectorAll('.body-text').forEach(el=>el.style.fontSize=fontSize+'px');
}
let fontWeight=400;
function setFontWeight(w){
  fontWeight=w;
  document.getElementById('wBtnNormal').classList.toggle('active',w===400);
  document.getElementById('wBtnBold').classList.toggle('active',w===600);
  document.querySelectorAll('.body-text').forEach(el=>el.style.fontWeight=w);
}
function render(){
  let app=document.getElementById('app'), bc=document.getElementById('breadcrumb');
  if(view==='home'){
    bc.innerHTML='<a href="#" onclick="goHome()">홈</a>';
    let h='';
    DATA.forEach((w,i)=>{h+='<div class="card" onclick="goWork('+i+')"><h3>'+esc(w.title)+'</h3><p>'+(w.desc?esc(w.desc):'')+'</p><p>'+w.chapters.length+'화</p></div>'});
    if(!DATA.length) h='<p style="color:#999">등록된 작품이 없습니다.</p>';
    app.innerHTML=h;
  } else if(view==='work'){
    let w=DATA[wi];
    bc.innerHTML='<a href="#" onclick="goHome()">홈</a> / '+esc(w.title);
    let h='';
    w.chapters.forEach((c,j)=>{h+='<div class="chapter-item" onclick="goChapter('+j+')"><span>'+esc(c.title)+'</span><span style="color:#999;font-size:13px">'+esc(c.date)+'</span></div>'});
    if(!w.chapters.length) h='<p style="color:#999">등록된 화가 없습니다.</p>';
    app.innerHTML=h;
  } else {
    let w=DATA[wi], c=w.chapters[ci];
    bc.innerHTML='<a href="#" onclick="goHome()">홈</a> / <a href="#" onclick="goWork('+wi+')">'+esc(w.title)+'</a> / '+esc(c.title);
    let prev=ci>0, next=ci<w.chapters.length-1;
    app.innerHTML='<div class="body-text" style="font-size:'+fontSize+'px;font-weight:'+fontWeight+'">'+esc(c.body)+'</div>'+
      '<div class="nav-btn">'+
      '<button '+(prev?'onclick="goChapter('+(ci-1)+')"':'disabled')+'>← 이전</button>'+
      '<button '+(next?'onclick="goChapter('+(ci+1)+')"':'disabled')+'>다음 →</button>'+
      '</div>';
  }
}
render();
</script>
</body>
</html>
